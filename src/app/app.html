<h2>User Name: {{userName}}</h2>
<input type="text" placeholder="Enter user name" (input)="getUserName($event)" value="{{name}}">
<br>
<button (click)="setUserName($event)">Set UserName</button>

<button (click)="setDefaultName()">Set Default</button>


<hr>
<h2> Email : {{email}}</h2>
<input type="text" placeholder="email" #emailField>
<button (click)="getEmail(emailField.value)">Get Email</button>
<button (click)="setEmail(emailField.value)">Set Email</button>
